<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Dynamic animated crop fields with moving perspective rows and time based sunrise sunset theme" id="farmScene"
  style="
    --sky-top:#2f3b73;
    --sky-mid:#f08f54;
    --sky-bottom:#ffd89a;
    --sun-x:820px;
    --sun-y:96px;
    --sun-size:62px;
    --sun-color:#ffd166;
    --sun-glow:#ff9f1c;
    --horizon:#324f2f;
    --crop-back:#6f8f34;
    --crop-mid:#86a83d;
    --crop-front:#315f25;
    --crop-highlight:#d6c84f;
    --soil:#4b2f1b;
    --shadow:#1a2416;
    --haze-opacity:.22;
    --star-opacity:0;
    --moon-opacity:0;
    --sun-opacity:1;
    --wind-speed:3.8s;
    --walk-speed:7.5s;
    --blade-sway:3deg;
    --field-saturation:1;
  ">
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--sky-top)"/>
      <stop offset="50%" stop-color="var(--sky-mid)"/>
      <stop offset="100%" stop-color="var(--sky-bottom)"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--sun-color)" stop-opacity=".95"/>
      <stop offset="45%" stop-color="var(--sun-glow)" stop-opacity=".38"/>
      <stop offset="100%" stop-color="var(--sun-glow)" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="fieldGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--crop-back)"/>
      <stop offset="55%" stop-color="var(--crop-mid)"/>
      <stop offset="100%" stop-color="var(--crop-front)"/>
    </linearGradient>

    <linearGradient id="furrowGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="60%" stop-color="var(--soil)" stop-opacity=".35"/>
      <stop offset="100%" stop-color="var(--soil)" stop-opacity=".8"/>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <pattern id="grainPattern" width="52" height="30" patternUnits="userSpaceOnUse">
      <path d="M8 30 C11 21 10 12 7 3" stroke="var(--crop-highlight)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".55"/>
      <path d="M18 30 C21 19 20 11 17 0" stroke="var(--crop-front)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity=".65"/>
      <path d="M30 30 C33 18 32 10 29 1" stroke="var(--crop-highlight)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity=".45"/>
      <path d="M43 30 C47 20 45 12 42 2" stroke="var(--crop-front)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".7"/>
    </pattern>

    <clipPath id="fieldClip">
      <path d="M0 220 C180 194 348 198 520 218 C660 234 806 221 956 205 C1040 196 1128 198 1200 214 L1200 420 L0 420 Z"/>
    </clipPath>

    <symbol id="cropBlade" viewBox="0 0 24 62">
      <path class="blade bladeA" d="M12 62 C7 47 7 31 13 3 C17 29 17 48 12 62 Z"/>
      <path class="blade bladeB" d="M12 61 C16 47 18 34 22 11 C13 30 10 47 12 61 Z"/>
      <path class="blade bladeC" d="M11 62 C7 51 5 39 2 18 C11 32 13 47 11 62 Z"/>
      <circle cx="12" cy="18" r="2.3" fill="var(--crop-highlight)" opacity=".65"/>
    </symbol>

    <style>
      #farmScene {
        background: var(--sky-bottom);
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, Arial, sans-serif;
      }

      .skyPulse {
        animation: skyBreath 10s ease-in-out infinite alternate;
      }

      .sunGroup {
        transform: translate(var(--sun-x), var(--sun-y));
        opacity: var(--sun-opacity);
      }

      .sunHalo {
        transform-origin: center;
        animation: haloPulse 3.8s ease-in-out infinite;
      }

      .cloudSlow {
        animation: driftClouds 46s linear infinite;
      }

      .cloudFast {
        animation: driftClouds 30s linear infinite reverse;
      }

      .moon {
        opacity: var(--moon-opacity);
      }

      .stars {
        opacity: var(--star-opacity);
      }

      .haze {
        opacity: var(--haze-opacity);
      }

      .fieldBase {
        fill: url(#fieldGradient);
        filter: saturate(var(--field-saturation));
      }

      .furrowsA {
        animation: walkRows var(--walk-speed) linear infinite;
      }

      .furrowsB {
        animation: walkRows calc(var(--walk-speed) * 1.35) linear infinite;
      }

      .foregroundCrops {
        animation: foregroundSlide calc(var(--walk-speed) * .8) linear infinite;
      }

      .cropCluster {
        transform-box: fill-box;
        transform-origin: bottom center;
        animation: sway var(--wind-speed) ease-in-out infinite alternate;
      }

      .cropCluster:nth-child(2n) {
        animation-duration: calc(var(--wind-speed) * .83);
        animation-delay: -.6s;
      }

      .cropCluster:nth-child(3n) {
        animation-duration: calc(var(--wind-speed) * 1.13);
        animation-delay: -1.1s;
      }

      .bladeA { fill: var(--crop-front); }
      .bladeB { fill: var(--crop-mid); opacity: .9; }
      .bladeC { fill: var(--crop-back); opacity: .85; }

      .vignette {
        fill: var(--shadow);
        opacity: .18;
      }

      @keyframes haloPulse {
        0%, 100% { transform: scale(.96); opacity: .58; }
        50% { transform: scale(1.12); opacity: .82; }
      }

      @keyframes driftClouds {
        from { transform: translateX(-220px); }
        to { transform: translateX(220px); }
      }

      @keyframes walkRows {
        0% { transform: translateY(-44px) scale(1); opacity: .45; }
        50% { opacity: .82; }
        100% { transform: translateY(50px) scale(1.08); opacity: .45; }
      }

      @keyframes foregroundSlide {
        0% { transform: translateX(-96px); }
        100% { transform: translateX(0); }
      }

      @keyframes sway {
        from { transform: rotate(calc(var(--blade-sway) * -1)); }
        to { transform: rotate(var(--blade-sway)); }
      }

      @keyframes skyBreath {
        from { opacity: .92; }
        to { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .sunHalo,
        .cloudSlow,
        .cloudFast,
        .furrowsA,
        .furrowsB,
        .foregroundCrops,
        .cropCluster,
        .skyPulse {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <rect class="skyPulse" width="1200" height="420" fill="url(#skyGradient)"/>

  <g class="stars">
    <circle cx="74" cy="52" r="1.4" fill="#ffffff" opacity=".85"/>
    <circle cx="156" cy="92" r="1" fill="#ffffff" opacity=".7"/>
    <circle cx="284" cy="42" r="1.2" fill="#ffffff" opacity=".9"/>
    <circle cx="397" cy="108" r="1.1" fill="#ffffff" opacity=".75"/>
    <circle cx="982" cy="58" r="1.3" fill="#ffffff" opacity=".85"/>
    <circle cx="1090" cy="116" r="1" fill="#ffffff" opacity=".7"/>
  </g>

  <g class="moon" transform="translate(1010 78)">
    <circle r="34" fill="#e8ebff" opacity=".88"/>
    <circle cx="12" cy="-6" r="34" fill="var(--sky-top)" opacity=".78"/>
  </g>

  <g class="sunGroup">
    <circle class="sunHalo" r="120" fill="url(#sunGlow)" filter="url(#softBlur)"/>
    <circle r="var(--sun-size)" fill="var(--sun-color)"/>
    <circle r="calc(var(--sun-size) * .74)" fill="#ffffff" opacity=".11"/>
  </g>

  <g class="cloudSlow" opacity=".33">
    <path d="M95 92 C126 55 178 67 187 101 C230 87 265 112 256 145 L52 145 C43 112 64 94 95 92 Z" fill="#ffffff"/>
    <path d="M812 72 C845 38 895 48 909 85 C948 76 982 101 977 133 L765 133 C753 104 777 75 812 72 Z" fill="#ffffff" opacity=".7"/>
  </g>

  <g class="cloudFast" opacity=".2">
    <path d="M422 126 C452 100 493 110 504 137 C537 130 566 151 558 176 L371 176 C365 149 389 127 422 126 Z" fill="#fff8e8"/>
    <path d="M1042 150 C1070 122 1115 132 1129 160 C1158 157 1178 176 1172 197 L998 197 C992 174 1012 151 1042 150 Z" fill="#fff8e8"/>
  </g>

  <path d="M0 214 C160 186 314 191 485 213 C626 232 760 220 914 204 C1028 191 1124 197 1200 214 L1200 254 L0 254 Z" fill="var(--horizon)" opacity=".86"/>
  <path class="haze" d="M0 190 C190 172 380 185 566 198 C780 215 955 185 1200 192 L1200 245 L0 245 Z" fill="#fff0c5"/>

  <g clip-path="url(#fieldClip)">
    <path class="fieldBase" d="M0 220 C180 194 348 198 520 218 C660 234 806 221 956 205 C1040 196 1128 198 1200 214 L1200 420 L0 420 Z"/>

    <g class="furrowsA">
      <path d="M598 220 L544 420" stroke="url(#furrowGradient)" stroke-width="22" fill="none" opacity=".65"/>
      <path d="M598 220 L390 420" stroke="url(#furrowGradient)" stroke-width="18" fill="none" opacity=".48"/>
      <path d="M598 220 L205 420" stroke="url(#furrowGradient)" stroke-width="14" fill="none" opacity=".38"/>
      <path d="M602 220 L680 420" stroke="url(#furrowGradient)" stroke-width="22" fill="none" opacity=".62"/>
      <path d="M604 220 L842 420" stroke="url(#furrowGradient)" stroke-width="18" fill="none" opacity=".47"/>
      <path d="M606 220 L1030 420" stroke="url(#furrowGradient)" stroke-width="14" fill="none" opacity=".36"/>
      <path d="M0 258 C226 240 419 245 600 262 C778 277 966 259 1200 248" stroke="#fff6a8" stroke-width="3" fill="none" opacity=".24"/>
      <path d="M0 304 C220 284 420 292 600 310 C784 328 966 305 1200 296" stroke="#fff6a8" stroke-width="4" fill="none" opacity=".24"/>
      <path d="M0 360 C222 337 420 351 600 371 C806 394 986 361 1200 350" stroke="#fff6a8" stroke-width="5" fill="none" opacity=".2"/>
    </g>

    <g class="furrowsB" opacity=".48">
      <path d="M596 230 L110 420" stroke="#1f2b16" stroke-width="12" fill="none" opacity=".28"/>
      <path d="M600 230 L1110 420" stroke="#1f2b16" stroke-width="12" fill="none" opacity=".28"/>
      <path d="M0 282 C260 262 445 274 600 292 C768 312 972 285 1200 277" stroke="#1f2b16" stroke-width="3" fill="none" opacity=".28"/>
      <path d="M0 335 C275 311 458 327 600 348 C780 374 980 338 1200 326" stroke="#1f2b16" stroke-width="4" fill="none" opacity=".24"/>
    </g>

    <rect x="0" y="250" width="1200" height="170" fill="url(#grainPattern)" opacity=".46"/>

    <g class="foregroundCrops">
      <g transform="translate(0 334) scale(1.15)">
        <use class="cropCluster" href="#cropBlade" x="0" y="0" width="42" height="90"/>
        <use class="cropCluster" href="#cropBlade" x="48" y="-12" width="44" height="98"/>
        <use class="cropCluster" href="#cropBlade" x="98" y="-4" width="42" height="92"/>
        <use class="cropCluster" href="#cropBlade" x="148" y="-14" width="46" height="100"/>
        <use class="cropCluster" href="#cropBlade" x="202" y="-3" width="41" height="92"/>
        <use class="cropCluster" href="#cropBlade" x="252" y="-17" width="46" height="104"/>
        <use class="cropCluster" href="#cropBlade" x="306" y="-6" width="42" height="92"/>
        <use class="cropCluster" href="#cropBlade" x="360" y="-15" width="46" height="102"/>
        <use class="cropCluster" href="#cropBlade" x="416" y="-5" width="43" height="94"/>
        <use class="cropCluster" href="#cropBlade" x="468" y="-17" width="47" height="103"/>
        <use class="cropCluster" href="#cropBlade" x="522" y="-4" width="42" height="94"/>
        <use class="cropCluster" href="#cropBlade" x="572" y="-13" width="44" height="100"/>
        <use class="cropCluster" href="#cropBlade" x="624" y="-1" width="41" height="91"/>
        <use class="cropCluster" href="#cropBlade" x="674" y="-16" width="45" height="103"/>
        <use class="cropCluster" href="#cropBlade" x="728" y="-3" width="42" height="93"/>
        <use class="cropCluster" href="#cropBlade" x="778" y="-13" width="44" height="101"/>
        <use class="cropCluster" href="#cropBlade" x="830" y="-2" width="42" height="92"/>
        <use class="cropCluster" href="#cropBlade" x="880" y="-18" width="48" height="104"/>
        <use class="cropCluster" href="#cropBlade" x="936" y="-5" width="43" height="94"/>
        <use class="cropCluster" href="#cropBlade" x="990" y="-16" width="46" height="103"/>
        <use class="cropCluster" href="#cropBlade" x="1044" y="-3" width="43" height="94"/>
        <use class="cropCluster" href="#cropBlade" x="1096" y="-12" width="44" height="101"/>
        <use class="cropCluster" href="#cropBlade" x="1148" y="-4" width="43" height="94"/>
        <use class="cropCluster" href="#cropBlade" x="1200" y="-13" width="44" height="101"/>
      </g>
    </g>
  </g>

  <path class="vignette" d="M0 0 H1200 V420 H0 Z M96 42 C190 365 1012 360 1110 42 C938 122 266 126 96 42 Z" fill-rule="evenodd"/>
</svg>
